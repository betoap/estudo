<section class="offer-list-shell">

                <div class="offer-detail-line" *ngIf="offer.contractLabel && offer.contractValue">
                  <span class="offer-label">{{ offer.contractLabel }}</span>
                  <span>{{ offer.contractValue }}</span>
                </div>

                <div class="offer-stack" *ngIf="offer.secondaryInfo?.length">
                  <div
                    class="offer-detail-line"
                    *ngFor="let item of offer.secondaryInfo"
                    [class.offer-detail-line--muted]="item.muted"
                  >
                    <span class="offer-label">{{ item.label }}</span>
                    <span>
                      <span class="detail-icon" *ngIf="item.icon">{{ item.icon }}</span>
                      {{ item.value }}
                    </span>
                  </div>
                </div>
              </div>

              <div class="offer-card__meta">
                <div class="offer-stack" *ngIf="offer.rightInfo?.length">
                  <div
                    class="offer-detail-line"
                    *ngFor="let item of offer.rightInfo"
                    [class.offer-detail-line--muted]="item.muted"
                  >
                    <span class="offer-label">{{ item.label }}</span>
                    <span>
                      <span class="detail-icon" *ngIf="item.icon">{{ item.icon }}</span>
                      {{ item.value }}
                    </span>
                  </div>
                </div>
              </div>
            </div>

            <div class="offer-card__action">
              <button
                type="button"
                class="offer-button"
                [disabled]="offer.disabled"
                [ngClass]="{
                  'offer-button--primary': (offer.actionVariant || 'primary') === 'primary',
                  'offer-button--outline': (offer.actionVariant || 'primary') === 'outline'
                }"
                (click)="onAction(offer)"
              >
                {{ offer.actionLabel }}
              </button>
            </div>
          </article>
        </div>
      </section>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <section class="offer-empty">
      <h3>{{ emptyTitle }}</h3>
      <p>{{ emptyDescription }}</p>
    </section>
  </ng-template>
</section>
